  <!-- Script de redirection SPA pour GitHub Pages -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/') {
        // Decode the path + optional query string encoded by 404.html
        var encoded = l.search.slice(2); // strip '/?/'
        var tildeQs = encoded.indexOf('~qs~');
        var path, qs;
        if (tildeQs !== -1) {
          path = encoded.slice(0, tildeQs).replace(/~and~/g, '&');
          qs   = encoded.slice(tildeQs + 4).replace(/~and~/g, '&');
        } else {
          path = encoded.replace(/~and~/g, '&');
          qs   = '';
        }
        // Reconstruct: keep the base (/ngMuniciapliGO) then add decoded path & qs
        var base = l.pathname.replace(/\/$/, ''); // e.g. /ngMuniciapliGO
        window.history.replaceState(
          null, null,
          base + '/' + path + (qs ? '?' + qs : '') + l.hash
        );
      }
    }(window.location));
  </script>
