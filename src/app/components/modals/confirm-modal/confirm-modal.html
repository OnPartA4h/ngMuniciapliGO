@if (isOpen()) {
  <div class="modal-backdrop" (click)="handleBackdropClick($event)">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <i class="fas fa-question-circle icon-confirm"></i>
        <h2>{{ title() }}</h2>
      </div>
      <div class="modal-body">
        <p>{{ message() }}</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading()">
          {{ cancelLabel() | translate }}
        </button>
        <button class="btn {{ confirmClass() }}" (click)="onConfirm()" [disabled]="isLoading()">
          @if (isLoading()) {
            <div class="spinner spinner--sm spinner--white"></div>
          } @else {
            {{ confirmLabel() | translate }}
          }
        </button>
      </div>
    </div>
  </div>
}
