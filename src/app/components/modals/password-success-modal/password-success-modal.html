@if (isOpen() && generatedPassword()) {
  <div class="modal-backdrop" (click)="closeModal()">
    <div class="password-modal" (click)="$event.stopPropagation()">
      <div class="modal-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      
      <h2>{{ 'CREATE_USER.SUCCESS_TITLE' | translate }}</h2>
      <p class="modal-message">{{ 'CREATE_USER.SUCCESS_MESSAGE' | translate }}</p>
      
      <div class="password-display">
        <span class="password-label">{{ 'CREATE_USER.TEMPORARY_PASSWORD' | translate }}:</span>
        <div class="password-box">
          <code>{{ generatedPassword() }}</code>
          <button type="button" class="copy-btn" (click)="copyPassword()">
            <i class="fas fa-copy"></i>
            {{ 'CREATE_USER.COPY_PASSWORD' | translate }}
          </button>
        </div>
      </div>
      
      <div class="modal-warning">
        <i class="fas fa-exclamation-triangle"></i>
        <span>{{ 'CREATE_USER.MUST_CHANGE_PASSWORD' | translate }}</span>
      </div>
      
      <button type="button" class="btn btn-primary btn-full" (click)="closeModal()">
        {{ 'CREATE_USER.UNDERSTOOD' | translate }}
      </button>
    </div>
  </div>
}
