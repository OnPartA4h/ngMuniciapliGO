<div class="modal-backdrop" (click)="handleBackdropClick($event)">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ 'LOGIN.FORGOT_PASSWORD_TITLE' | translate }}</h2>
      <button class="close-btn" (click)="closeModal()" [disabled]="isLoading">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <!-- Success Message -->
      <div class="alert alert-success" *ngIf="successMessage">
        <i class="fas fa-check-circle"></i>
        <span>{{ successMessage | translate }}</span>
      </div>

      <!-- Error Message -->
      <div class="alert alert-error" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ errorMessage | translate }}</span>
      </div>

      <!-- Description -->
      <p class="modal-description">
        {{ 'LOGIN.FORGOT_PASSWORD_DESC' | translate }}
      </p>

      <!-- Form -->
      <form [formGroup]="forgotPasswordForm" (ngSubmit)="submitForgotPassword()" *ngIf="!successMessage">
        <div class="form-group">
          <label for="email">
            {{ 'LOGIN.EMAIL' | translate }} <span class="required">*</span>
          </label>
          <input
            type="email"
            id="email"
            formControlName="email"
            [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate"
            [class.error]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
            [disabled]="isLoading"
          />
          <span class="error-text" *ngIf="forgotPasswordForm.get('email')?.hasError('required') && forgotPasswordForm.get('email')?.touched">
            {{ 'LOGIN.EMAIL_REQUIRED' | translate }}
          </span>
          <span class="error-text" *ngIf="forgotPasswordForm.get('email')?.hasError('email') && forgotPasswordForm.get('email')?.touched">
            {{ 'LOGIN.EMAIL_INVALID' | translate }}
          </span>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="closeModal()" [disabled]="isLoading">
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button 
        type="submit" 
        class="btn btn-primary" 
        (click)="submitForgotPassword()"
        [disabled]="forgotPasswordForm.invalid || isLoading || !!successMessage"
      >
        <span class="spinner" *ngIf="isLoading"></span>
        {{ isLoading ? ('COMMON.LOADING' | translate) : ('LOGIN.SEND_RESET_LINK' | translate) }}
      </button>
    </div>
  </div>
</div>
