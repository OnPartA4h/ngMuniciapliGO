<header>
  <a routerLink="/home" class="logo">
    <img src="/assets/images/Logo.png" style="width: 50px;"> <span>MunicipaliGO</span>
  </a>
  
  <nav>
    <!--<a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      {{ 'HEADER.HOME' | translate }}
    </a>-->

    <a routerLink="/map" routerLinkActive="active">
      Map
    </a>

    <a *ngIf="userRoles().includes('ColBlanc') || userRoles().includes('Admin')" 
       routerLink="/manage-reports" 
       routerLinkActive="active">
      {{ 'HEADER.MANAGE_REPORTS' | translate }}
    </a>
    
    <a *ngIf="userRoles().includes('Admin')" 
       routerLink="/manage-users" 
       routerLinkActive="active">
      {{ 'HEADER.MANAGE_USERS' | translate }}
    </a>
  </nav>

  <div class="header-actions">
    <!-- Language Toggle -->
    <button class="btn-language" (click)="toggleLanguage()" title="Change language">
      <i class="fas fa-globe"></i>
      <span>{{ getCurrentLanguage() }}</span>
    </button>

    <!-- Profile Avatar (when connected) -->
    <a *ngIf="isConnected()" routerLink="/profile" class="profile-avatar" routerLinkActive="active">
      <img *ngIf="authService.profilePictureUrl()" [src]="authService.profilePictureUrl()!" alt="Profile" />
      <i *ngIf="!authService.profilePictureUrl()" class="fas fa-user"></i>
    </a>
    

    <!-- Login/Logout -->
    <a *ngIf="!isConnected()" routerLink="/login" class="btn-login">
      {{ 'HEADER.LOGIN' | translate }}
    </a>

    <button *ngIf="isConnected()" class="btn-login" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i>
      {{ 'HEADER.LOGOUT' | translate }}
    </button>
  </div>
</header>
