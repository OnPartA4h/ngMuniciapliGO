<div class="modal-backdrop" *ngIf="isOpen" (click)="handleBackdropClick($event)">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ 'EDIT_USER_MODAL.TITLE' | translate }}</h2>
      <button class="close-btn" (click)="closeModal()" [disabled]="isLoading">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body" *ngIf="user">
      <div class="user-details">
        <div class="detail-group">
          <label>{{ 'EDIT_USER_MODAL.FIRST_NAME' | translate }}</label>
          <p>{{ user.firstName }}</p>
        </div>
        
        <div class="detail-group">
          <label>{{ 'EDIT_USER_MODAL.LAST_NAME' | translate }}</label>
          <p>{{ user.lastName }}</p>
        </div>
        
        <div class="detail-group">
          <label>{{ 'EDIT_USER_MODAL.EMAIL' | translate }}</label>
          <p>{{ user.email }}</p>
        </div>
        
        <div class="detail-group">
          <label>{{ 'EDIT_USER_MODAL.PHONE' | translate }}</label>
          <p>{{ user.phoneNumber }}</p>
        </div>

        <div class="detail-group">
          <label>{{ 'EDIT_USER_MODAL.MUST_RESET_PASSWORD' | translate }}</label>
          <p>{{ user.mustResetPassword ? ('COMMON.YES' | translate) : ('COMMON.NO' | translate) }}</p>
        </div>
      </div>

      <div class="roles-section">
        <h3>{{ 'EDIT_USER_MODAL.ROLES' | translate }}</h3>
        <div class="roles-list">
          <div class="role-item" *ngFor="let role of roles">
            <label class="checkbox-label">
              <input 
                type="checkbox" 
                [checked]="hasRole(role.key)" 
                (change)="toggleRole(role)"
                [disabled]="isLoading"
              />
              <span>{{ role.label }}</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger" (click)="openDeleteConfirm()" [disabled]="isLoading">
        <i class="fas fa-trash"></i>
        {{ 'EDIT_USER_MODAL.DELETE_USER' | translate }}
      </button>
      <button class="btn btn-secondary" (click)="closeModal()" [disabled]="isLoading">
        {{ 'COMMON.CLOSE' | translate }}
      </button>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<app-delete-confirm-modal
  [user]="user"
  [isOpen]="showDeleteConfirm"
  [isLoading]="isLoading"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()"
></app-delete-confirm-modal>
