<div class="modal-backdrop" *ngIf="isOpen" (click)="handleBackdropClick($event)">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <i class="fas fa-exclamation-triangle icon-warning"></i>
      <h2>{{ 'DELETE_CONFIRM_MODAL.TITLE' | translate }}</h2>
    </div>

    <div class="modal-body" *ngIf="user">
      <p [innerHTML]="'DELETE_CONFIRM_MODAL.MESSAGE' | translate: {firstName: user.firstName, lastName: user.lastName}"></p>
      <p class="warning-text">{{ 'DELETE_CONFIRM_MODAL.WARNING' | translate }}</p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onCancel()" [disabled]="isLoading">
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button class="btn btn-danger" (click)="onConfirm()" [disabled]="isLoading">
        <i class="fas fa-trash"></i>
        <span *ngIf="!isLoading">{{ 'COMMON.DELETE' | translate }}</span>
        <span *ngIf="isLoading">{{ 'COMMON.DELETING' | translate }}</span>
      </button>
    </div>
  </div>
</div>
