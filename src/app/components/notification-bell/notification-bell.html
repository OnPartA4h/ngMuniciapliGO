<button class="notification-bell" (click)="goToNotifications()" [attr.aria-label]="'Notifications (' + notificationService.unreadCount() + ' non lues)'">
  <i class="fas fa-bell"></i>
  <span class="badge" *ngIf="notificationService.unreadCount() > 0">{{ notificationService.unreadCount() > 99 ? '99+' : notificationService.unreadCount() }}</span>
</button>
