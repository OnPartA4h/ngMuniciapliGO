<div class="page-container">
  <app-page-header
    title="Assistance / Help Desk"
    subtitle="Gestion des appels et des problèmes utilisateurs"
    [showBackButton]="true">
  </app-page-header>

  <div class="helpdesk-layout">
    <!-- Colonne utilisateur -->
    <div class="helpdesk-user-panel">
      <div class="helpdesk-user-card">
        <div class="helpdesk-user-avatar">
          <img src="https://i.pravatar.cc/72?img=5" alt="Avatar utilisateur" />
        </div>
        <div class="helpdesk-user-info">
          <h2>{{supportAgent?.firstName}} {{supportAgent?.lastName}}</h2>
          <div class="helpdesk-user-meta">
            <span><i class="fas fa-envelope"></i> {{supportAgent?.email}}</span>
            <span><i class="fas fa-phone"></i> {{supportAgent?.phoneNumber | phoneNumber}}</span>
            <span><i class="fas fa-map-marker-alt"></i> {{supportAgent?.streetNumber}} {{supportAgent?.streetName}}, {{supportAgent?.city}}</span>
          </div>
        </div>
      </div>
      <div class="helpdesk-call-info">
        <div class="helpdesk-call-header">
          <i class="fas fa-headset"></i> Appel en cours
        </div>
        <div class="helpdesk-call-details">
          <span><b>Agent :</b> Marc Bouchard</span>
          <span><b>Début :</b> 14:32</span>
          <span><b>Durée :</b> 02:15</span>
          <span><b>Statut :</b> En cours</span>
        </div>
      </div>
    </div>

    <!-- Colonne problèmes -->
    <div class="helpdesk-problems-panel">
      <div class="helpdesk-search-bar">
        <form>
            <input type="text" placeholder="Rechercher un problème..." [(ngModel)]="currentSearch" name="currentSearch"/>
            <button type="submit" (click)="getProblems()" class="btn btn-primary"><i class="fas fa-search"></i></button>
        </form>
        
      </div>
      <div class="helpdesk-problems-list">
        <app-report-list [problems]="problems()"
        [pagination]="pagination"
        [loading]="loading"
        (pageChange)="onPageChange($event)" />
      </div>
    </div>
  </div>
</div>
