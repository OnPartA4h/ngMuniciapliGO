<div class="page-container page-container--narrow">
  <div class="notifications-header">
    <h1 class="page-header__title">{{ 'NOTIFICATIONS.TITLE' | translate }}</h1>
    <button 
      class="btn btn-primary" 
      (click)="markAllAsRead()" 
      [disabled]="notifications.length === 0 || areAllNotificationsRead()"
      *ngIf="notifications.length > 0">
      <i class="fas fa-check-double"></i>
      {{ 'NOTIFICATIONS.MARK_ALL_READ' | translate }}
    </button>
  </div>

  <div class="filter-tabs">
    <button 
      class="filter-tab" 
      [class.active]="filterRead === undefined"
      (click)="setFilter(undefined)">
      {{ 'NOTIFICATIONS.ALL' | translate }}
      <span class="filter-tab__count">{{ totalCount }}</span>
    </button>
    <button 
      class="filter-tab" 
      [class.active]="filterRead === false"
      (click)="setFilter(false)">
      {{ 'NOTIFICATIONS.UNREAD' | translate }}
    </button>
    <button 
      class="filter-tab" 
      [class.active]="filterRead === true"
      (click)="setFilter(true)">
      {{ 'NOTIFICATIONS.READ' | translate }}
    </button>
  </div>

  <div class="notifications-list" *ngIf="!loading">
    <div 
      *ngFor="let notification of notifications" 
      class="notification-item"
      [class.unread]="!notification.estLue"
      (click)="goToReport(notification)">
      
      <div class="notification-indicator" *ngIf="!notification.estLue"></div>
      
      <div class="notification-content">
        <div class="notification-header-row">
          <h3 class="notification-title">{{ notification.problemeTitre }}</h3>
          <span class="notification-time">{{ getTimeAgo(notification.dateCreation) }}</span>
        </div>
        <p class="notification-message">{{ notification.message }}</p>
      </div>

      <button 
        class="mark-read-btn" 
        (click)="markAsRead(notification); $event.stopPropagation()"
        *ngIf="!notification.estLue"
        [attr.aria-label]="'NOTIFICATIONS.MARK_AS_READ' | translate">
        <i class="fas fa-check"></i>
      </button>
    </div>

    <app-empty-state
      *ngIf="notifications.length === 0"
      iconClass="fas fa-bell-slash"
      [title]="'NOTIFICATIONS.NO_NOTIFICATIONS' | translate"
      [description]="'NOTIFICATIONS.NO_NOTIFICATIONS_DESC' | translate">
    </app-empty-state>
  </div>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <app-pagination
    *ngIf="totalPages > 1 && !loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>
