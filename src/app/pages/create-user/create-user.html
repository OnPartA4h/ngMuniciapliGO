<div class="page-container page-container--narrow">
  <app-page-header [title]="'CREATE_USER.TITLE' | translate"
    [subtitle]="'CREATE_USER.SUBTITLE' | translate"
    [showBackButton]="true"
    (back)="cancel()" />

  <div class="form-card">
    <app-create-user-form (formSubmit)="onFormSubmit($event)"
      (cancel)="cancel()" />
  </div>
</div>

<!-- Password Success Modal -->
<app-password-success-modal [isOpen]="showPasswordModal"
  [generatedPassword]="generatedPassword"
  (close)="closePasswordModal()" />
