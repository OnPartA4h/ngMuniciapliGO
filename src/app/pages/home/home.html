<div class="container">
    <div class="page-header">
        <h1>{{ 'DASHBOARD.TITLE' | translate }}</h1>
        <p>{{ 'DASHBOARD.SUBTITLE' | translate }}</p>
    </div>
    <div class="filter-group">
        <select [(ngModel)]="currentTimeSpan" (change)="getStats()">
            @for (s of generalService.timeSpans(); track $index) {
            <option [ngValue]=$index>{{ s.label }}</option>
            }
        </select>
        <select [(ngModel)]="currentDistrict" (change)="getStats()">
            <option [ngValue]=null>{{ 'DASHBOARD.DISTRICTS' | translate }}</option>
            @for (s of generalService.districtNames(); track $index) {
            <option [ngValue]=s.id>{{ s.name }}</option>
            }
        </select>
        <select [(ngModel)]="currentCategory" (change)="getStats()">
            <option [ngValue]=null>{{ 'DASHBOARD.CATEGORIES' | translate }}</option>
            @for (s of generalService.categories(); track $index) {
            <option [ngValue]=$index>{{ s.label }}</option>
            }
        </select>
        <select [(ngModel)]="currentAssigneA" (change)="getStats()">
            @for (s of generalService.assignees(); track $index) {
            <option [ngValue]=$index>{{ s.label }}</option>
            }
        </select>
        <div class="combobox">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" [placeholder]="'DASHBOARD.FIND_COLBLEU' | translate" [(ngModel)]="search"
                    (ngModelChange)="getColBleus()" (focus)="showSearch = true" (keyup.enter)="clearColBleu()" />
            </div>
            @if (colBleus.length && showSearch) {
            <div class="dropdown">
                @for (c of colBleus; track $index) {
                <div class="dropdown-item" (click)="selectColBleu(c)">
                    <i class="fas fa-user"></i>
                    {{ c.label }}
                </div>
                }
            </div>
            }
        </div>
    </div>
    <div class="stat-boxes-row">
        <app-stat-box [title]="'DASHBOARD.RESOLUTION' | translate" [value]="stats?.tempsResolution"></app-stat-box>
        <app-stat-box [title]="'DASHBOARD.PRISE_EN_CHARGE' | translate"
            [value]="stats?.tempsPriseEnCharge"></app-stat-box>
        <app-stat-box [title]="'DASHBOARD.ASSIGNATION' | translate" [value]="stats?.tempsAssignation"></app-stat-box>
    </div>
    <div class="app-chart-container">
        <div class="stat-title">{{ 'DASHBOARD.GRAPH_TITLE' | translate }}</div>
        @if(stats?.graph?.length === 0){
        <span class="stat-unit error">{{ 'DASHBOARD.ERROR' | translate }}</span>
        }
        @else {
        <app-chart [datasets]="datasets" [chartType]="'line'"></app-chart>
        }
    </div>
</div>
