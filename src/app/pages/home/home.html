<div class="container">
    <div class="page-header">
        <h1>{{ 'DASHBOARD.TITLE' | translate }}</h1>
        <p>{{ 'DASHBOARD.SUBTITLE' | translate }}</p>
    </div>
    <div class="stat-boxes-row">
        <app-stat-box title="Temps de résolution moyen" [value]="stats?.tempsResolution"></app-stat-box>
        <app-stat-box title="Temps de prise en charge moyen" [value]="stats?.tempsPriseEnCharge"></app-stat-box>
        <app-stat-box title="Temps d'assignation moyen" [value]="stats?.tempsAssignation"></app-stat-box>
    </div>
    <div class="charts-grid">
        <app-chart [datasets]="datasets" [chartType]="'line'"></app-chart>
    </div>
</div>
