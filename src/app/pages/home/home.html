<div class="container">
    <div class="page-header">
        <h1>{{ 'DASHBOARD.TITLE' | translate }}</h1>
        <p>{{ 'DASHBOARD.SUBTITLE' | translate }}</p>
    </div>
    <div class="filter-group">
        <select [(ngModel)]="currentTimeSpan" (change)="getStats()">
            @for (s of generalService.timeSpans(); track $index) {
            <option [value]="$index">{{ s.label }}</option>
            }
        </select>
        <select [(ngModel)]="currentAssigneA" (change)="getStats()">
            @for (s of generalService.assignees(); track $index) {
            <option [value]="$index">{{ s.label }}</option>
            }
        </select>
    </div>
    <div class="stat-boxes-row">
        <app-stat-box [title]="'DASHBOARD.RESOLUTION' | translate" [value]="stats?.tempsResolution"></app-stat-box>
        <app-stat-box [title]="'DASHBOARD.PRISE_EN_CHARGE' | translate"
            [value]="stats?.tempsPriseEnCharge"></app-stat-box>
        <app-stat-box [title]="'DASHBOARD.ASSIGNATION' | translate" [value]="stats?.tempsAssignation"></app-stat-box>
    </div>
    <div class="app-chart-container">
        <div class="stat-title">{{ 'DASHBOARD.GRAPH_TITLE' | translate }}</div>
        @if(stats?.graph?.length === 0){
        <span class="stat-unit error">{{ 'DASHBOARD.ERROR' | translate }}</span>
        }
        @else {
        <app-chart [datasets]="datasets" [chartType]="'line'"></app-chart>
        }
    </div>
</div>
