<div class="page-container">
  <app-page-header
    [title]="'MANAGE_USERS.TITLE' | translate"
    [subtitle]="'MANAGE_USERS.SUBTITLE' | translate"
    [hasAction]="true">
    <a routerLink="/create-user" class="btn btn-primary">
      <i class="fas fa-user-plus"></i>
      {{ 'MANAGE_USERS.CREATE_USER' | translate }}
    </a>
  </app-page-header>

  <div class="filter-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" [placeholder]="'MANAGE_USERS.SEARCH_PLACEHOLDER' | translate" [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()" />
    </div>
    <div class="filter-group">
      <select [(ngModel)]="selectedRole" (change)="onRoleFilterChange()">
        <option value="">{{ 'MANAGE_USERS.FILTER_ALL' | translate }}</option>
        <option *ngFor="let role of availableRoles" [value]="role.key">
          {{ role.label }}
        </option>
      </select>
      <button class="btn btn-secondary" (click)="onSearch()">
        <i class="fas fa-search"></i>
        {{ 'COMMON.SEARCH' | translate }}
      </button>
    </div>
  </div>

  <div class="data-table-container" *ngIf="!isLoading">
    <table class="data-table">
      <thead>
        <tr>
          <th>{{ 'MANAGE_USERS.FIRST_NAME' | translate }}</th>
          <th>{{ 'MANAGE_USERS.LAST_NAME' | translate }}</th>
          <th>{{ 'MANAGE_USERS.ROLES' | translate }}</th>
          <th>{{ 'MANAGE_USERS.ACTIONS' | translate }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users" (click)="openEditModal(user)" class="clickable-row">
          <td>{{ user.firstName }}</td>
          <td>{{ user.lastName }}</td>
          <td>
            <div class="badges-list">
              <span class="badge badge-info" *ngFor="let role of user.roles">
                {{ getRoleLabel(role) }}
              </span>
            </div>
          </td>
          <td>
            <button class="btn-icon" (click)="openEditModal(user); $event.stopPropagation()">
              <i class="fas fa-edit"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <app-empty-state
      *ngIf="users.length === 0"
      iconClass="fas fa-users"
      [title]="'MANAGE_USERS.NO_USERS' | translate"
      [description]="'MANAGE_USERS.NO_USERS_DESC' | translate">
    </app-empty-state>
  </div>

  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <app-pagination
    *ngIf="!isLoading && users.length > 0"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)">
  </app-pagination>
</div>

<app-edit-user-modal [user]="selectedUser" [isOpen]="showEditModal" (close)="closeEditModal()"
  (userDeleted)="onUserDeleted()"></app-edit-user-modal>
