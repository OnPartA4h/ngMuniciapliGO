<div class="page-container">
  <app-page-header
    [title]="'MANAGE_USERS.TITLE' | translate"
    [subtitle]="'MANAGE_USERS.SUBTITLE' | translate"
    [hasAction]="true">
    <a routerLink="/create-user" class="btn btn-primary">
      <i class="fas fa-user-plus"></i>
      {{ 'MANAGE_USERS.CREATE_USER' | translate }}
    </a>
  </app-page-header>

  <div class="filter-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" [placeholder]="'MANAGE_USERS.SEARCH_PLACEHOLDER' | translate" [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()" />
    </div>
    <div class="filter-group">
      <select [(ngModel)]="selectedRole" (change)="onRoleFilterChange()">
        <option value="">{{ 'MANAGE_USERS.FILTER_ALL' | translate }}</option>
        @for (role of availableRoles; track role.key) {
          <option [value]="role.key">{{ role.label }}</option>
        }
      </select>
      <button class="btn btn-secondary" (click)="onSearch()">
        <i class="fas fa-search"></i>
        {{ 'COMMON.SEARCH' | translate }}
      </button>
    </div>
  </div>

  @if (!isLoading) {
    <app-users-table [users]="users"
      [roles]="availableRoles"
      (editUser)="openEditModal($event)" />
  }

  @if (isLoading) {
    <app-loading-spinner />
  }

  @if (!isLoading && users.length > 0) {
    <app-pagination [currentPage]="currentPage"
      [totalPages]="totalPages"
      (pageChange)="onPageChange($event)" />
  }
</div>

<app-edit-user-modal [user]="selectedUser" [isOpen]="showEditModal" (close)="closeEditModal()"
  (userDeleted)="onUserDeleted()" />
