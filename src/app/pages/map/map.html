<div class="map-container">
  <div id="map"></div>
  <app-map-sidebar 
    [problem]="selectedProblem" 
    [isOpen]="isSidebarOpen"
    (close)="closeSidebar()">
  </app-map-sidebar>

  <button class="center-button" (click)="resetView()">
    <i class="fas fa-crosshairs"></i>
  </button>

  <button class="settings-button" (click)="openModal()">
    <i class="fas fa-cog"></i>
  </button>
</div>

<app-map-config-modal [isOpen]="isConfigModalOpen" (close)="closeModal()" (apply)="reloadProblems()"></app-map-config-modal>
