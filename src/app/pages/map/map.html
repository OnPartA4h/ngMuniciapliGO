<div class="map-container">
  <div id="map"></div>
  <app-map-sidebar 
    [problem]="selectedProblem" 
    [isOpen]="isSidebarOpen"
    (close)="closeSidebar()">
  </app-map-sidebar>

  <button (click)="openModal()">Settings</button>
</div>

<app-map-config-modal [isOpen]="isConfigModalOpen" (close)="closeModal()"></app-map-config-modal>
