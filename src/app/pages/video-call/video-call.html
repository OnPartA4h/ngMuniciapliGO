<div class="video-call-container">
  @if (error()) {
    <div class="call-error">
      <i class="fas fa-exclamation-triangle"></i>
      <p>{{ error() }}</p>
      <button class="btn btn-primary" (click)="hangUp()">{{ 'CALL.CLOSE' | translate }}</button>
    </div>
  } @else if (isConnecting()) {
    <div class="call-connecting">
      <div class="connecting-spinner"></div>
      <p>{{ 'CALL.CONNECTING' | translate }}</p>
      <span class="call-target-name">{{ chatName() }}</span>
    </div>
  } @else {
    <!-- Video area -->
    <div class="call-video-area">
      @if (isVideo) {
        <div class="remote-videos" #remoteVideos>
          <div class="no-remote-video">
            <div class="remote-avatar">
              <i class="fas fa-user"></i>
            </div>
            <span>{{ chatName() }}</span>
          </div>
        </div>
        <div class="local-video-wrapper" [class.video-off]="isVideoOff()">
          <video #localVideo autoplay playsinline muted></video>
          @if (isVideoOff()) {
            <div class="video-off-placeholder">
              <i class="fas fa-video-slash"></i>
            </div>
          }
        </div>
      } @else {
        <div class="audio-call-display">
          <div class="audio-avatar">
            <i class="fas fa-user"></i>
          </div>
          <span class="audio-name">{{ chatName() }}</span>
        </div>
      }
    </div>

    <!-- Call info bar -->
    <div class="call-info-bar">
      <span class="call-duration">{{ formatDuration(callDuration()) }}</span>
    </div>

    <!-- Controls -->
    <div class="call-controls">
      <button class="control-btn" [class.active]="isMuted()" (click)="toggleMute()"
        [title]="(isMuted() ? 'CALL.UNMUTE' : 'CALL.MUTE') | translate">
        <i class="fas" [class.fa-microphone]="!isMuted()" [class.fa-microphone-slash]="isMuted()"></i>
      </button>

      @if (isVideo) {
        <button class="control-btn" [class.active]="isVideoOff()" (click)="toggleVideo()"
          [title]="(isVideoOff() ? 'CALL.VIDEO_ON' : 'CALL.VIDEO_OFF') | translate">
          <i class="fas" [class.fa-video]="!isVideoOff()" [class.fa-video-slash]="isVideoOff()"></i>
        </button>
      }

      <button class="control-btn hangup" (click)="hangUp()" [title]="'CALL.HANG_UP' | translate">
        <i class="fas fa-phone-slash"></i>
      </button>
    </div>
  }
</div>
