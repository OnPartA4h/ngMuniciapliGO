<div class="manage-reports-container">
  <div class="page-header">
    <h1>Gestion des Problèmes</h1>
    <p>Liste de tous les problèmes signalés</p>
  </div>

  <div class="filters-bar">
    <div class="search-box">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" placeholder="Rechercher un problème..." />
    </div>
    <div class="filter-group">
      <select>
        <option value="">Toutes les catégories</option>
        <option value="voirie">Voirie</option>
        <option value="eclairage">Éclairage</option>
        <option value="proprete">Propreté</option>
        <option value="espaces-verts">Espaces verts</option>
        <option value="autre">Autre</option>
      </select>
      <select>
        <option value="">Tous les statuts</option>
        <option value="nouveau">Nouveau</option>
        <option value="en-cours">En cours</option>
        <option value="assigne">Assigné</option>
      </select>
    </div>
  </div>

  <div class="reports-list">
    <!-- Report Item 1 -->
    <div class="report-card" routerLink="/report-details/{{p.id}}" *ngFor="let p of problems">
      <div class="report-thumbnail">
        <img src="https://placehold.co/120x90/e8f4f8/1565c0?text=Photo" alt="Photo du problème" />
      </div>
      <div class="report-info">
        <div class="report-header">
          <h3 class="report-title">{{p.titre}}</h3>
          <span class="report-status status-nouveau">{{StatutProbleme[p.statut]}}</span>
        </div>
        <div class="report-details">
          <span class="report-location">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            {{p.location}}
          </span>
          <span class="report-category">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
              <line x1="7" y1="7" x2="7.01" y2="7"></line>
            </svg>
            {{CategorieProbleme[p.categorie]}}
          </span>
        </div>
        <div class="report-meta">
          <span class="report-date">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            {{p.dateCreation | daysAgo}}
          </span>
          <span class="report-assignee">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <div *ngIf="!p.assignedUser">Non assigné</div>
            <div *ngIf="p.assignedUser">{{p.assignedUser.firstName + ' ' + p.assignedUser.lastName}}</div>
           
          </span>
        </div>
      </div>
      <div class="report-action">
        <svg class="icon arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </div>

    

  <div class="pagination">
    <button class="pagination-btn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Précédent
    </button>
    <span class="pagination-info">Page 1 sur 3</span>
    <button class="pagination-btn">
      Suivant
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>
</div>
