<div class="page-container">
  <app-page-header [title]="'MANAGE_REPORTS.TITLE' | translate"
    [subtitle]="'MANAGE_REPORTS.SUBTITLE' | translate" />

  <!-- Navigation Tabs -->
  <div class="filter-tabs">
    <a class="filter-tab active" routerLink="/manage-reports">
      <i class="fas fa-clipboard-list"></i>
      {{ 'HEADER.MANAGE_REPORTS' | translate }}
    </a>
    <a class="filter-tab" routerLink="/manage-duplicates">
      <i class="fas fa-clone"></i>
      {{ 'DUPLICATES.TAB' | translate }}
    </a>
  </div>

  <div class="search-div-top">
    <div class="search-div">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" [placeholder]="'MANAGE_REPORTS.SEARCH_PLACEHOLDER' | translate" [(ngModel)]="currentSearch"
          (keyup.enter)="getAllReports()" />
      </div>
      <button class="btn btn-secondary btn-toggle-filters" (click)="showFilters = !showFilters">
        <i class="fa-solid fa-filter"></i>
        <i class="fas" [ngClass]="showFilters ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
      </button>
    </div>
    <button class="btn btn-secondary" (click)="getAllReports()">
      <i class="fas fa-search"></i>
      {{ 'COMMON.SEARCH' | translate }}
    </button>
  </div>

  @if (showFilters) {
    <div class="search-div-top">
      <div class="filter-group">
        <select [(ngModel)]="currentAssigneA" (change)="getAllReports()">
          <option [ngValue]="null">{{ 'MANAGE_REPORTS.ALL_ASSIGNEA' | translate }}</option>
          @for (s of generalService.assignees(); track $index) {
            <option [value]="$index + 1">{{ s.label }}</option>
          }
        </select>
        <select [(ngModel)]="currentCategory" (change)="getAllReports()">
          <option [ngValue]="null">{{ 'MANAGE_REPORTS.ALL_CATEGORIES' | translate }}</option>
          @for (c of generalService.categories(); track $index) {
            <option [value]="$index + 1">{{ c.label }}</option>
          }
        </select>
        <select [(ngModel)]="currentStatus" (change)="getAllReports()">
          <option [ngValue]="null">{{ 'MANAGE_REPORTS.ALL_STATUSES' | translate }}</option>
          @for (s of generalService.statuses(); track $index) {
            <option [value]="$index + 1">{{ s.label }}</option>
          }
        </select>
        <button class="btn btn-secondary btn-reset-filters" (click)="resetFilters()">
          <i class="fa-solid fa-arrow-rotate-left"></i>
        </button>
      </div>
    </div>
  }

  <app-report-list [problems]="problems"
    [pagination]="pagination"
    [loading]="loading"
    (pageChange)="onPageChange($event)" />
</div>
